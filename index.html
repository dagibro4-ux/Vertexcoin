<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tap</title>
    <style>
        body { background: #050505; color: white; font-family: Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Top Section */
        .header { text-align: center; padding: 20px; }
        .rank { color: gold; font-weight: bold; margin-bottom: 5px; }
        .balance { font-size: 45px; font-weight: bold; color: #00f2ff; }

        /* Middle Section - Large Coin */
        .coin-area { flex: 1; display: flex; justify-content: center; align-items: center; }
        #coin-img { width: 280px; height: 280px; cursor: pointer; transition: 0.1s; border-radius: 50%; box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); }
        #coin-img:active { transform: scale(0.95); }

        /* Bottom Navigation */
        .nav-bar { display: flex; justify-content: space-around; padding: 20px; background: #111; border-top: 1px solid #333; }
        .btn { background: #222; color: white; border: 1px solid #444; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #7000ff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="rank" id="rank">Rank: Rookie</div>
        <div class="balance" id="score">0</div>
        <div>Your Balance</div>
    </div>

    <div class="coin-area">
        <!-- REPLACE THE LINK BELOW WITH YOUR OWN IMAGE LINK -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg" id="coin-img" alt="Coin">
    </div>

    <div class="nav-bar">
        <button class="btn" onclick="boost()">🚀 Boost</button>
        <button class="btn" onclick="task()">📋 Tasks</button>
        <button class="btn" onclick="withdraw()">💰 Withdraw</button>
    </div>

    <script>
        // Load saved score from device
        let score = parseInt(localStorage.getItem('score')) || 0;
        let power = 1;

        document.getElementById('score').innerText = score;
        updateUI();

        document.getElementById('coin-img').onclick = () => {
            score += power;
            updateUI();
        };

        function boost() {
            if (score >= 100) {
                score -= 100;
                power += 2;
                alert("Boost Successful! +2 Tap Power");
                updateUI();
            } else {
                alert("Not enough coins!");
            }
        }

        function task() {
            const confirmed = confirm("Warning: You must click 'Get Link' to receive rewards. Continue?");
            if (confirmed) {
                window.open("https://ouo.io/tiTmRou", "_blank");
                score += 2000;
                updateUI();
            }
        }

        function withdraw() {
            if (score >= 50000) {
                prompt("Enter your wallet address:");
                alert("Withdrawal request sent!");
            } else {
                alert("Minimum withdrawal is 50,000 coins.");
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            localStorage.setItem('score', score); // Saves score automatically
            
            if (score > 100000) document.getElementById('rank').innerText = "Rank: Diamond";
            else if (score > 20000) document.getElementById('rank').innerText = "Rank: Gold";
        }
    </script>
</body>
</html>
