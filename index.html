<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; margin: 0; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score { font-size: 40px; font-weight: bold; margin-bottom: 10px; }
        .coin-btn { background: none; border: none; cursor: pointer; }
        .coin-btn img { width: 180px; height: 180px; border-radius: 50%; }
        .nav-bar { display: flex; justify-content: space-around; background-color: #1e293b; padding: 15px; }
        .nav-item { color: #94a3b8; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: #f59e0b; }
        .tab-content { display: none; text-align: center; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="content">
        <div id="tapTab" class="tab-content active">
            <div class="score" id="score">0</div>
            <button class="coin-btn" id="tapBtn">
                <img src="https://cdn-icons-png.flaticon.com/512/272/272525.png" alt="Coin">
            </button>
        </div>
        <div id="boostTab" class="tab-content"><h2>Boost</h2><button onclick="buyBoost()" style="padding:10px; background:#f59e0b; border:none; border-radius:5px;">Upgrade (+2 Coins)</button></div>
        <div id="tasksTab" class="tab-content">
            <p style="color:red; font-size:12px;">⚠️ Get Link ካልተጫኑ ኮይን አይሰጥም!</p>
            <a href="https://ouo.io/tiTmRou" target="_blank" onclick="confirmTask()" style="background:#f59e0b; padding:10px; display:inline-block; text-decoration:none; color:black; margin-top:10px;">Claim 1000 Coins</a>
        </div>
    </div>
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchTab('tapTab', this)">Tap</button>
        <button class="nav-item" onclick="switchTab('boostTab', this)">Boost</button>
        <button class="nav-item" onclick="switchTab('tasksTab', this)">Tasks</button>
    </div>
    <script>
        // ስሞቹን ቀይረናል (v2) - ይሄ የድሮውን ስህተት ያስወግዳል
        let count = parseInt(localStorage.getItem('vortexCoins_v2')) || 0;
        let pointsPerTap = parseInt(localStorage.getItem('vortexPerTap_v2')) || 1;

        function updateUI() { document.getElementById('score').innerText = count.toLocaleString(); }
        updateUI();

        document.getElementById('tapBtn').addEventListener('click', () => {
            count += pointsPerTap;
            localStorage.setItem('vortexCoins_v2', count);
            updateUI();
        });

        function buyBoost() {
            count += 2; // በየBoost 2 ይጨምራል
            localStorage.setItem('vortexCoins_v2', count);
            localStorage.setItem('vortexPerTap_v2', pointsPerTap += 2);
            updateUI();
        }

        function confirmTask() {
            alert("⚠️ Get Link መጫንዎን ያረጋግጡ!");
            setTimeout(() => { count += 1000; localStorage.setItem('vortexCoins_v2', count); updateUI(); }, 3000);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
