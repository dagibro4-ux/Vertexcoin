<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap to Earn Coin</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a202c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .container {
            text-align: center;
        }
        .score {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f6ad55;
        }
        .coin-btn {
            background: radial-gradient(circle, #f6e05e 0%, #dd6b20 100%);
            border: 8px solid #cbd5e0;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 80px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        .coin-btn:active {
            transform: scale(0.92);
        }
        .info {
            margin-top: 30px;
            font-size: 16px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VORTEX TAP</h1>
        <div class="score" id="score">0</div>
        
        <button class="coin-btn" id="tapBtn">🪙</button>
        
        <p class="info">ሳንቲሙን በመጫን Coin ሰብስብ!</p>
    </div>

    <script>
        // Telegram Web App ማስተካከያ
        const tg = window.Telegram.WebApp;
        tg.expand(); // ገፁን ሙሉ ስክሪን ያደርገዋል

        let count = 0;
        const scoreElement = document.getElementById('score');
        const tapBtn = document.getElementById('tapBtn');

        // በስልክ የተቀመጠ ነጥብ ካለ መጫን
        if(localStorage.getItem('userCoins')) {
            count = parseInt(localStorage.getItem('userCoins'));
            scoreElement.innerText = count;
        }

        // Tap ሲደረግ ነጥብ መጨመር
        tapBtn.addEventListener('click', () => {
            count += 1;
            scoreElement.innerText = count;
            localStorage.setItem('userCoins', count);
        });
    </script>
</body>
</html>
