
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tap</title>
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; text-align: center; font-family: 'Arial', sans-serif; margin: 0; }
        .container { padding: 20px; }
        #coin-img { width: 250px; cursor: pointer; transition: 0.2s; border-radius: 50%; box-shadow: 0 0 20px rgba(0,255,255,0.5); }
        #coin-img:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin: 20px 0; }
        .nav { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; position: fixed; bottom: 0; width: 100%; }
        button { background: #ff4500; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .warning { color: #ffeb3b; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">🪙 <span id="score">0</span></div>
    <div id="level">Level: Beginner</div>
    <img src="https://i.imgur.com/your-coin-image.png" id="coin-img" alt="Coin">
    <p>Tap per click: <span id="tap-power">1</span></p>
</div>

<div class="nav">
    <button onclick="showSection('tap')">Tap</button>
    <button onclick="boost()">Boost</button>
    <button onclick="showTasks()">Tasks</button>
    <button onclick="withdraw()">Withdraw</button>
</div>

<script>
    let score = 0, power = 1, level = 1;

    // Tap Logic
    document.getElementById('coin-img').onclick = () => {
        score += power;
        updateUI();
    };

    function boost() {
        if (score >= 100) {
            score -= 100;
            power += 2;
            alert("Boost ተሳክቷል! አሁን በየጠቅታው ተጨማሪ 2 ቶከን ያገኛሉ።");
            updateUI();
        } else { alert("በቂ ኮይን የለህም!"); }
    }

    function showTasks() {
        const confirmTask = confirm("⚠️ ማስጠንቀቂያ፡ ሽልማት ለማግኘት በሊንኩ ውስጥ 'Get Link' የሚለውን መጫንዎን አይርሱ! ለመቀጠል እሺ ይበሉ።");
        if (confirmTask) {
            window.open("https://ouo.io/tiTmRou", "_blank");
            score += 2000;
            alert("ተልእኮው ተጠናቋል! 2000 ቶከን ተጨምሯል።");
            updateUI();
        }
    }

    function withdraw() {
        if (score >= 50000) {
            alert("የwithdraw ጥያቄዎ ለAdmin ተልኳል።");
        } else { alert("ቢያንስ 50,000 ኮይን ያስፈልግዎታል።"); }
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('tap-power').innerText = power;
        // Leveling
        if (score > 10000) level = 2;
        document.getElementById('level').innerText = "Level: " + level;
    }
</script>
</body>
</html>
