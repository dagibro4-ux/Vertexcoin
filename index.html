<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            padding: 15px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            color: #f59e0b;
            letter-spacing: 1.5px;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .tab-content {
            display: none;
            width: 100%;
            text-align: center;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .multiplier-tag {
            font-size: 14px;
            color: #f59e0b;
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .coin-btn {
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            border-radius: 50%;
            transition: transform 0.08s ease;
            box-shadow: 0 0 35px rgba(245, 158, 11, 0.4);
        }
        .coin-btn img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: block;
        }
        .coin-btn:active {
            transform: scale(0.92);
        }
        
        /* Card Styles */
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            width: 90%;
            max-width: 350px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-btn {
            background-color: #f59e0b;
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        /* Bottom Navigation Bar */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background-color: #1e293b;
            padding: 12px 0;
            border-top: 1px solid #334155;
        }
        .nav-item {
            color: #94a3b8;
            background: none;
            border: none;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-item.active {
            color: #f59e0b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ VORTEX TAP</h1>
    </div>

    <div class="content">
        <!-- 1. TAP TAB -->
        <div id="tapTab" class="tab-content active">
            <div class="score" id="score">0</div>
            <div class="multiplier-tag" id="multiplierDisplay">+1 Coin per Tap</div>
            <button class="coin-btn" id="tapBtn">
                <img src="https://i.ibb.co/V1H3M1w/vortex-coin.png" alt="Coin">
            </button>
            <p style="margin-top: 20px; color: #94a3b8; font-size: 14px;">Tap the coin to earn points!</p>
        </div>

        <!-- 2. BOOST TAB -->
        <div id="boostTab" class="tab-content">
            <h2 style="margin-bottom: 15px;">Upgrade Tap Power</h2>
            <div class="card">
                <div>
                    <h4>Multi-Tap Boost</h4>
                    <p style="color: #94a3b8; font-size: 12px; margin-top: 4px;">Increases coins per tap</p>
                    <p style="color: #f59e0b; font-weight: bold; font-size: 13px; margin-top: 2px;" id="boostCostDisplay">Cost: 100 Coins</p>
                </div>
                <button class="card-btn" onclick="buyBoost()">Upgrade</button>
            </div>
        </div>

        <!-- 3. TASKS TAB -->
        <div id="tasksTab" class="tab-content">
            <h2 style="margin-bottom: 15px;">Tasks & Ads</h2>
            <div class="card">
                <div>
                    <h4>Watch Ad Task</h4>
                    <p style="color: #94a3b8; font-size: 12px; margin-top: 4px;">Visit link & complete ad</p>
                    <p style="color: #22c55e; font-weight: bold; font-size: 13px; margin-top: 2px;">+1000 Coins</p>
                </div>
                <!-- 👉 ያመጣኸው የ ouo.io link እዚህ ተካቷል -->
                <a href="https://ouo.io/tiTmRou" target="_blank" class="card-btn" onclick="addReward(1000)">Claim</a>
            </div>
        </div>

        <!-- 4. WITHDRAW TAB -->
        <div id="withdrawTab" class="tab-content">
            <h2 style="margin-bottom: 10px;">Withdraw Funds</h2>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Minimum: 100,000 Coins</p>
            
            <div class="card" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                <label style="font-size: 12px; color: #94a3b8;">TON Wallet Address:</label>
                <input type="text" placeholder="Enter TON Address" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white;">
                <button class="card-btn" style="width: 100%; margin-top: 5px;" onclick="alert('Withdrawals open after Airdrop launch!')">Withdraw</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchTab('tapTab', this)">
            <span>🪙</span> Tap
        </button>
        <button class="nav-item" onclick="switchTab('boostTab', this)">
            <span>🚀</span> Boost
        </button>
        <button class="nav-item" onclick="switchTab('tasksTab', this)">
            <span>📋</span> Tasks
        </button>
        <button class="nav-item" onclick="switchTab('withdrawTab', this)">
            <span>💎</span> Withdraw
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let count = parseInt(localStorage.getItem('vortexCoins')) || 0;
        let pointsPerTap = parseInt(localStorage.getItem('vortexPerTap')) || 1;
        let boostCost = parseInt(localStorage.getItem('vortexBoostCost')) || 100;

        const scoreElement = document.getElementById('score');
        const tapBtn = document.getElementById('tapBtn');
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        const boostCostDisplay = document.getElementById('boostCostDisplay');

        function updateUI() {
            scoreElement.innerText = count;
            multiplierDisplay.innerText = '+' + pointsPerTap + ' Coins per Tap';
            boostCostDisplay.innerText = 'Cost: ' + boostCost + ' Coins';
        }

        updateUI();

        // Tap Event
        tapBtn.addEventListener('click', () => {
            count += pointsPerTap;
            localStorage.setItem('vortexCoins', count);
            updateUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        // Boost Event
        function buyBoost() {
            if (count >= boostCost) {
                count -= boostCost;
                pointsPerTap *= 2; // ነጥቡን እጥፍ ያደርገዋል
                boostCost += 100;   // ዋጋውን በ 100 ይጨምረዋል
                
                localStorage.setItem('vortexCoins', count);
                localStorage.setItem('vortexPerTap', pointsPerTap);
                localStorage.setItem('vortexBoostCost', boostCost);
                
                updateUI();
                alert('Boost Successful! You now earn ' + pointsPerTap + ' coins per tap!');
            } else {
                alert('Not enough coins! You need ' + boostCost + ' coins.');
            }
        }

        // Switch Tabs
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Add Reward for Task
        function addReward(amount) {
            count += amount;
            localStorage.setItem('vortexCoins', count);
            updateUI();
            alert('Task completed! +' + amount + ' coins added.');
        }
    </script>
</body>
</html>
